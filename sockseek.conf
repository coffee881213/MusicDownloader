# Sockseek configuration
# https://github.com/fiso64/sockseek
# Place this file next to sockseek.exe
# OR at: %APPDATA%\sockseek\sockseek.conf

username = zpf10284140
password = zpf123,

# Output directory (overridden by --output-dir CLI arg)
# output-dir = downloads

# ── Preferred format: lossless first ─────────────────────────────────────────

# Try FLAC/WAV first; fall back to any common format if unavailable
pref-format = flac,wav
pref-min-bitrate = 3000
pref-max-bitrate = 9999

# Accept only lossless formats (FLAC minimum, no MP3/AAC/OGG)
format = flac,wav,alac,ape,wv

# ── China network optimization ────────────────────────────────────────────────
# Goal: maximize download speed and success rate from CN -> Soulseek servers
# (which are mainly in Europe/US, typically 180-300 ms RTT from China)

# Start downloading immediately when a preferred format is found.
fast-search = true

# connect-timeout: time to wait when logging in to Soulseek server.
# Default is 20000ms (20s) — far too short from China.
# Set to 60s to survive CN -> EU/US login latency.
connect-timeout = 60000

# 30 parallel download slots; fully saturate a 100 Mbps+ broadband connection.
concurrent-jobs = 30

# Keep concurrent searches low to avoid the 30-search-per-3-min server limit.
concurrent-searches = 2

# Search timeout: 15 s (default 5 s times out too often at CN latency)
search-timeout = 15000

# Abort a transfer that has stalled for 90 s (prevents stuck downloads)
max-stale-time = 90000

# Conservative search rate: 28 searches per 220 s window (server default window)
# (Soulseek bans at 34/220 s; leave headroom)
searches-per-time = 28
searches-renew-time = 220

# Retry strategy for unstable CN connections
max-retries = 10
unknown-error-retries = 3

# Peer reputation: quickly skip peers that fail repeatedly
fails-to-downrank = 1
fails-to-ignore = 3

# Listen port: 0 = let OS pick a free port automatically.
# If your router supports UPnP or you have a static port-forward,
# set a fixed port here for better peer connectivity (e.g. listen-port = 50505).
listen-port = 0

# ── Quality matching ──────────────────────────────────────────────────────────

# Prefer files whose path contains exact track title / album name
pref-strict-title = true
pref-strict-album = true

# Tolerate up to 15 s duration difference (Chinese releases often have
# slightly different lengths than the reference metadata)
length-tol = 15
pref-length-tol = 10

# ── Sharing (informational; Sockseek is download-only) ───────────────────────
shared-files = 0
shared-folders = 0
